<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your SchoolPortal password." />
  <title>Reset Password — SchoolPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <div class="auth-page-center">
    <div class="auth-card">

      <a href="/" class="logo" style="margin-bottom:8px;">
        <span class="logo-mark">SP</span>
        SchoolPortal
      </a>

      <h1>Reset your password</h1>
      <p class="auth-card-sub">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

      <!-- Error banner -->
      <div class="auth-error" id="auth-error" role="alert" aria-live="assertive"></div>

      <!-- Reset form -->
      <form class="login-form" id="reset-form" novalidate>
        <div class="form-group">
          <label for="reset-email">Email Address</label>
          <input
            type="email"
            id="reset-email"
            name="email"
            required
            placeholder="you@school.edu"
            autocomplete="email"
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="reset-submit">
          Send Reset Link &rarr;
        </button>
      </form>

      <!-- Success state -->
      <div class="auth-success" id="reset-success" role="status" aria-live="polite">
        <div class="form-success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <strong>Check your inbox!</strong>
        <p>We've sent a password reset link to <span id="reset-email-display"></span>. Click the link in the email to create a new password.</p>
      </div>

      <div class="auth-card-footer">
        <a href="/login.html">&larr; Back to sign in</a>
      </div>

    </div>
  </div>

  <script type="module" src="/src/reset-password.js"></script>
</body>
</html>
