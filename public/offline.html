<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — SchoolOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      color: #1e293b;
      padding: 24px;
    }
    .offline-card {
      text-align: center;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 48px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .offline-icon {
      width: 64px; height: 64px; margin: 0 auto 24px;
      background: #fef3c7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .offline-icon svg { width: 32px; height: 32px; color: #92400e; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 24px; }
    .retry-btn {
      display: inline-block; padding: 12px 32px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .retry-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>SchoolOS needs an internet connection to sync with your school's data. Check your connection and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
