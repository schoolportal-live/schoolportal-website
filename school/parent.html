<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Portal — SchoolOS</title>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="auth-loading">

  <div class="auth-loader" id="auth-loader">
    <div class="auth-loader-spinner"></div>
  </div>

  <div class="app-content">

    <!-- NAV -->
    <nav class="dash-nav">
      <div class="container">
        <a href="/school/parent.html" class="logo">
          <span class="logo-mark" data-brand-logo>SP</span>
          <span data-brand-name>SchoolPortal</span>
        </a>
        <span class="dash-nav-badge parent" id="role-badge">Parent</span>
        <div style="flex:1;"></div>
        <div class="dash-nav-user">
          <span id="notification-badge" style="display:none;cursor:pointer;" title="Notifications">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span id="notification-count" style="background:var(--red);color:#fff;font-size:11px;padding:1px 5px;border-radius:10px;margin-left:2px;font-weight:600;"></span>
          </span>
          <span id="user-name"></span>
          <button class="btn btn-ghost btn-sm" id="logout-btn">Log Out</button>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="dash-main">
      <div class="container">

        <!-- Header -->
        <div class="dash-header">
          <div>
            <h1>Parent Portal</h1>
            <p>Welcome, <strong id="welcome-name"></strong>. <span id="child-info"></span></p>
          </div>
        </div>

        <!-- Stats -->
        <div class="dash-stats">
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <h3>Messages</h3>
            <p class="stat-number" id="stat-messages">0</p>
            <p class="stat-label">sent</p>
          </div>
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3>Requests</h3>
            <p class="stat-number" id="stat-requests">0</p>
            <p class="stat-label">submitted</p>
          </div>
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <h3>Notifications</h3>
            <p class="stat-number" id="stat-notifications">0</p>
            <p class="stat-label">unread</p>
          </div>
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <h3>Child</h3>
            <p class="stat-number" id="stat-child-section" style="font-size:16px;">—</p>
            <p class="stat-label" id="stat-child-name">—</p>
          </div>
        </div>

        <!-- Tabs -->
        <div class="dash-tabs" id="tab-buttons"></div>

        <!-- Tab content -->
        <div id="tab-content"></div>

      </div>
    </main>

  </div>

  <script type="module" src="/src/school/parent.js"></script>
</body>
</html>
