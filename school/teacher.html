<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard — SchoolOS</title>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="auth-loading">

  <div class="auth-loader" id="auth-loader">
    <div class="auth-loader-spinner"></div>
  </div>

  <div class="app-content">

    <!-- NAV -->
    <nav class="dash-nav">
      <div class="container">
        <a href="/school/teacher.html" class="logo">
          <span class="logo-mark" data-brand-logo>SP</span>
          <span data-brand-name>SchoolPortal</span>
        </a>
        <span class="dash-nav-badge" id="role-badge" style="background:#e0f2fe;color:#0369a1;">Teacher</span>
        <div style="flex:1;"></div>
        <div class="dash-nav-user">
          <span id="user-name"></span>
          <button class="btn btn-ghost btn-sm" id="logout-btn">Log Out</button>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="dash-main">
      <div class="container">

        <!-- Header -->
        <div class="dash-header">
          <div>
            <h1>Teacher Dashboard</h1>
            <p>Welcome, <strong id="welcome-name"></strong>. <span id="role-description"></span></p>
          </div>
        </div>

        <!-- Stats -->
        <div class="dash-stats">
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            <h3>Home Section</h3>
            <p class="stat-number" id="stat-home-section" style="font-size:18px;">—</p>
            <p class="stat-label" id="stat-home-label">not assigned</p>
          </div>
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
            <h3>Sections</h3>
            <p class="stat-number" id="stat-sections">0</p>
            <p class="stat-label">assigned</p>
          </div>
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <h3>Students</h3>
            <p class="stat-number" id="stat-students">0</p>
            <p class="stat-label">across sections</p>
          </div>
          <div class="stat-card">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3>Subjects</h3>
            <p class="stat-number" id="stat-subjects">0</p>
            <p class="stat-label">teaching</p>
          </div>
        </div>

        <!-- Tabs -->
        <div class="dash-tabs" id="tab-buttons"></div>

        <!-- Tab content -->
        <div id="tab-content"></div>

      </div>
    </main>

  </div>

  <script type="module" src="/src/school/teacher.js"></script>
</body>
</html>
