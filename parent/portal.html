<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Portal — SchoolPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="auth-loading">

  <!-- Loading spinner -->
  <div class="auth-loader" id="auth-loader">
    <div class="auth-loader-spinner"></div>
  </div>

  <div class="app-content">

    <!-- ═══════════════════════════════════════════
         PORTAL NAV
    ═══════════════════════════════════════════ -->
    <nav class="dash-nav">
      <div class="container">
        <a href="/parent/portal.html" class="logo">
          <span class="logo-mark">SP</span>
          SchoolPortal
        </a>
        <span class="dash-nav-badge parent">Parent</span>
        <div style="flex:1;"></div>
        <div class="dash-nav-user">
          <span id="user-name"></span>
          <button class="btn btn-ghost btn-sm" id="logout-btn">Log Out</button>
        </div>
      </div>
    </nav>

    <!-- ═══════════════════════════════════════════
         PORTAL CONTENT
    ═══════════════════════════════════════════ -->
    <main class="dash-main">
      <div class="container">
        <div class="dash-header">
          <div>
            <h1>Parent Portal</h1>
            <p>Welcome back, <strong id="welcome-name"></strong>. Stay connected with your child's school.</p>
          </div>
        </div>

        <!-- Notices Section -->
        <div class="dash-section">
          <h2>School Notices</h2>
          <div id="notices-list" class="dash-list">
            <div class="dash-list-empty">
              <p>Loading notices...</p>
            </div>
          </div>
        </div>

        <!-- Other Cards (future features) -->
        <div class="dash-grid" style="margin-top: 24px;">
          <div class="dash-card">
            <div class="dash-card-icon green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <h3>Upcoming Events</h3>
            <p class="dash-stat-number">--</p>
            <p class="dash-stat-label">Coming soon</p>
          </div>

          <div class="dash-card">
            <div class="dash-card-icon blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            </div>
            <h3>Progress &amp; Grades</h3>
            <p class="dash-stat-number">--</p>
            <p class="dash-stat-label">Coming soon</p>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script type="module" src="/src/parent/portal.js"></script>
</body>
</html>
