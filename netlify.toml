[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Clean URLs for all pages
[[redirects]]
  from = "/login"
  to   = "/login.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to   = "/reset-password.html"
  status = 200

# New SchoolOS pages
[[redirects]]
  from = "/school/dashboard"
  to   = "/school/dashboard.html"
  status = 200

[[redirects]]
  from = "/school/admin"
  to   = "/school/admin.html"
  status = 200

[[redirects]]
  from = "/school/teacher"
  to   = "/school/teacher.html"
  status = 200

[[redirects]]
  from = "/school/linemanager"
  to   = "/school/linemanager.html"
  status = 200

[[redirects]]
  from = "/school/parent"
  to   = "/school/parent.html"
  status = 200

[[redirects]]
  from = "/school/student"
  to   = "/school/student.html"
  status = 200

[[redirects]]
  from = "/school/org-builder"
  to   = "/school/org-builder.html"
  status = 200

[[redirects]]
  from = "/school/timetable"
  to   = "/school/timetable.html"
  status = 200

[[redirects]]
  from = "/platform/dashboard"
  to   = "/platform/dashboard.html"
  status = 200

# Legacy routes redirect to new dashboards
[[redirects]]
  from = "/admin/dashboard"
  to   = "/school/dashboard.html"
  status = 301

[[redirects]]
  from = "/admin/dashboard.html"
  to   = "/school/dashboard.html"
  status = 301

[[redirects]]
  from = "/parent/portal"
  to   = "/school/parent.html"
  status = 301

[[redirects]]
  from = "/parent/portal.html"
  to   = "/school/parent.html"
  status = 301

# Custom 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# NOTE: Form email notifications configured in Netlify dashboard
# Email: founders.space.ai@gmail.com for "contact" and "demo-booking" forms.
