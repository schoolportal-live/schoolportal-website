[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Clean URLs for all pages
[[redirects]]
  from = "/login"
  to   = "/login.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to   = "/reset-password.html"
  status = 200

[[redirects]]
  from = "/admin/dashboard"
  to   = "/admin/dashboard.html"
  status = 200

[[redirects]]
  from = "/parent/portal"
  to   = "/parent/portal.html"
  status = 200

# Custom 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# NOTE: Form email notifications configured in Netlify dashboard
# Email: founders.space.ai@gmail.com for "contact" and "demo-booking" forms.
